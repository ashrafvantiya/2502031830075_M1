<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb Hover Effect</title>

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#111;
        }

        #bulb{
            width:220px;
            cursor:pointer;
        }
    </style>
</head>
<body>

    <img 
        id="bulb"
        src="https://www.w3schools.com/js/pic_bulboff.gif"
        alt="Bulb"
    >

    <script>

        let bulb = document.getElementById("bulb");

        // Mouse hover -> ON
        bulb.addEventListener("mouseover", function(){
            bulb.src = "https://www.w3schools.com/js/pic_bulbon.gif";
        });

        // Mouse leave -> OFF
        bulb.addEventListener("mouseout", function(){
            bulb.src = "https://www.w3schools.com/js/pic_bulboff.gif";
        });

    </script>

</body>
</html>
